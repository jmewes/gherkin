name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/gherkin-${{ github.ref_name }}-${{ matrix.name }}${{ matrix.ext }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gherkin-${{ matrix.name }}
          path: dist/gherkin-${{ github.ref_name }}-${{ matrix.name }}${{ matrix.ext }}

  release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
